name: Build and Push Notte to GAR

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: evaluation-deployment
  GAR_REGION: us-central1
  GAR_REPOSITORY: notte
  IMAGE_NAME: notte

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}
      
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ github.ref_name }}
          tags: type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./notte.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NOTTE_VERSION=0.0.2

      - name: Trigger agent-hub rebuild
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.AGENT_HUB_DISPATCH_TOKEN }}
          repository: ParadigmShift-AI-Corp/agent-hub
          event-type: notte-image-updated
          client-payload: |
            {
              "notte_image_tag": "sha-${{ github.sha }}",
              "notte_image_full": "${{ steps.meta.outputs.tags }}",
              "source_commit": "${{ github.sha }}",
              "source_ref": "${{ github.ref_name }}"
            } 
